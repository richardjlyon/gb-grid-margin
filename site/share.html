<!DOCTYPE html><html lang="en-GB"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Share cards — Grid Margin</title>
<link rel="stylesheet" href="style.css">
</head><body>
<header class="masthead"><div class="container masthead-inner">
  <p class="brand"><a href="/"><span class="brand-tick" aria-hidden="true"></span>GB Grid Margin</a></p>
  <nav aria-label="Primary"><a href="methodology.html">Methodology</a><a href="about.html">About</a></nav>
</div></header>
<main class="container">
  <h1 class="headline">Share cards</h1>
  <p class="def">Every card is a sourced figure, rendered the same as the dashboard. Pick one and post it.</p>
  <div id="gallery" class="card-gallery"></div>
</main>
<script type="module">
import { shareButtons } from './share.js';
const root = document.getElementById('gallery');
try {
  const { cards } = await (await fetch('share/cards.json', { cache: 'no-store' })).json();
  root.innerHTML = cards.map((c) => `
    <figure class="card-tile">
      <img src="${c.png}" alt="${c.figure} — ${c.label}" width="1200" height="630" loading="lazy">
      <figcaption>${c.figure} — ${c.label}</figcaption>
      ${shareButtons(c)}
    </figure>`).join('');
} catch (e) {
  root.innerHTML = `<p class="warn">Share cards unavailable. ${e.message || e}</p>`;
}
</script>
</body></html>
