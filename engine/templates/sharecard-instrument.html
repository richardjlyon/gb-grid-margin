<!DOCTYPE html><html lang="en-GB"><head><meta charset="utf-8"><meta name="viewport" content="width=1200">
<style>
@font-face{font-family:"Space Grotesk";src:url("fonts/space-grotesk-700.woff2") format("woff2");font-weight:700;}
@font-face{font-family:"Space Grotesk";src:url("fonts/space-grotesk-500.woff2") format("woff2");font-weight:500;}
@font-face{font-family:"Newsreader";src:url("fonts/newsreader-400.woff2") format("woff2");font-weight:400;}
@font-face{font-family:"Spline Sans Mono";src:url("fonts/spline-sans-mono-500.woff2") format("woff2");font-weight:500;}
*{margin:0;box-sizing:border-box;}
body{width:1200px;height:630px;padding:56px 72px;background:#15181c;color:#fff;
  font-family:"Space Grotesk",sans-serif;position:relative;overflow:hidden;}
.top{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:22px;letter-spacing:.04em;text-transform:uppercase;
  position:absolute;top:56px;left:72px;right:72px;}
.brand{display:flex;align-items:center;gap:14px;}
.tick{width:20px;height:20px;border-radius:3px;background:#d6121f;}
.site{font:500 19px "Spline Sans Mono",monospace;text-transform:none;opacity:.72;}
.row{display:flex;align-items:flex-end;gap:48px;height:100%;}
.col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;height:100%;padding-bottom:8px;}
.figure{font-weight:700;font-size:128px;line-height:.92;letter-spacing:-.02em;}
.figure .accent{color:#d6121f;}
.label{font:400 34px/1.25 "Newsreader",serif;margin-top:18px;max-width:14em;color:#d7dbdf;}
.foot{font:500 20px "Spline Sans Mono",monospace;opacity:.7;margin-top:18px;}
.viz{flex:none;width:560px;display:flex;align-items:center;justify-content:flex-end;}
.viz svg{width:100%;height:auto;}
</style></head>
<body>
  <div class="top"><span class="brand"><span class="tick"></span>Grid Margin</span><span class="site">gridmargin.co.uk</span></div>
  <div class="row">
    <div class="col"><p class="figure">{{FIGURE}}</p><p class="label">{{LABEL}}</p><p class="foot">{{STAMP}}</p></div>
    <div class="viz">{{SVG}}</div>
  </div>
</body></html>
