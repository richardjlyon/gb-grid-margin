<!DOCTYPE html><html lang="en-GB"><head><meta charset="utf-8"><meta name="viewport" content="width=1200">
<style>
@font-face{font-family:"Space Grotesk";src:url("fonts/space-grotesk-700.woff2") format("woff2");font-weight:700;}
@font-face{font-family:"Newsreader";src:url("fonts/newsreader-400.woff2") format("woff2");font-weight:400;}
@font-face{font-family:"Spline Sans Mono";src:url("fonts/spline-sans-mono-500.woff2") format("woff2");font-weight:500;}
*{margin:0;box-sizing:border-box;}
html,body{width:1200px;height:630px;}
body{padding:64px 72px;display:flex;flex-direction:column;justify-content:space-between;
  font-family:"Space Grotesk",sans-serif;color:#fff;
  background:radial-gradient(120% 140% at 85% 0%,#20242b 0%,#15181c 45%,#0d0f12 100%);}
.top{display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:22px;letter-spacing:.13em;}
.brand{display:flex;align-items:center;gap:14px;}
.tick{width:18px;height:18px;border-radius:3px;background:#d6121f;}
.url{font:500 19px "Spline Sans Mono",monospace;letter-spacing:.04em;opacity:.72;}
.mid{flex:1;display:flex;align-items:center;gap:24px;}
.txt{flex:1;}
.h{font-weight:700;font-size:88px;line-height:.98;letter-spacing:-.02em;}
.h .r{color:#d6121f;}
.tag{font:400 34px/1.3 "Newsreader",serif;margin-top:24px;max-width:18em;color:#cfd4d9;}
.giz{flex:none;}
.rule{height:1px;background:rgba(255,255,255,.16);margin-bottom:22px;}
.foot{display:flex;justify-content:space-between;align-items:baseline;font:500 19px "Spline Sans Mono",monospace;letter-spacing:.04em;}
.foot .l{color:#aeb4bb;}.foot .r{color:#7e858d;letter-spacing:.06em;}
</style></head>
<body>
  <div class="top"><span class="brand"><span class="tick"></span>GB GRID MARGIN</span><span class="url">gridmargin.co.uk</span></div>
  <div class="mid"><div class="txt"><p class="h">{{HEADLINE}}</p><p class="tag">{{TAGLINE}}</p></div><div class="giz">{{SVG}}</div></div>
  <div><div class="rule"></div><div class="foot"><span class="l">gridmargin.co.uk</span><span class="r">EVERY FIGURE TRACES TO ELEXON · NESO · DUKES</span></div></div>
</body></html>
