name: Refresh settled data

# Daily rebuild of the settled-data layer. Appends newly-settled half-hours to the
# committed history stores (FUELHH + embedded), revalidates them, rebuilds every
# site/data/*.json derived series, then commits and pushes. The push is what triggers
# Vercel's git-integration production deploy — so this job IS the daily release.
#
# The live verdict layer is unaffected: the browser fetches Elexon directly, so the
# dashboard is always current regardless of this cron. This only advances the settled
# history and the derived cards behind it.

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily — settled data lags days, so the hour is slack
  workflow_dispatch: {}    # allow a manual run from the Actions tab

permissions:
  contents: write          # the job commits the refreshed data back to main

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync deps (incl. Playwright for card rendering)
        run: uv sync

      - name: Append newly-settled FUELHH history
        run: uv run python -m engine.history append

      - name: Validate FUELHH store (fatal — the critical settled store)
        run: uv run python -m engine.history validate

      # Embedded (NESO solar/wind) is best-effort: it lags ~3 weeks and its ragged edge
      # must NEVER abort the FUELHH → derived → deploy path. A transient incomplete NESO
      # day previously failed the whole run, silently staling the entire settled layer
      # (including the healthy FUELHH data). On any append/validate failure, revert the
      # embedded store to last-good and carry on; only the embedded-derived layers lag a cycle.
      - name: Append + validate embedded solar/wind (best-effort, revert on failure)
        run: |
          uv run python -m engine.embedded_history append || true
          if ! uv run python -m engine.embedded_history validate; then
            echo "::warning::embedded store invalid (likely ragged NESO edge) — reverting to last-good; FUELHH + derived still refresh"
            git checkout -- data/history/embedded_*.csv
          fi

      # System price (Elexon cash-out) store — best-effort, mirrors the embedded edge lesson:
      # a ragged/incomplete recent day must NEVER abort the FUELHH → derived → deploy path.
      # append uses on_revision="update" (absorbs late price revisions); on validate failure,
      # revert to last-good so the import-cost layer just lags a cycle. The validate gate (which
      # loads the price known-gaps manifest) failing on a NEW incomplete day IS the ragged-edge guard.
      - name: Append + validate system-price store (best-effort, revert on failure)
        run: |
          uv run python -m engine.system_price_history append || true
          if ! uv run python -m engine.system_price_history validate; then
            echo "::warning::system-price store invalid (ragged Elexon edge) — reverting to last-good; FUELHH + derived still refresh"
            git checkout -- data/history/system_price_20*.csv
          fi

      - name: Rebuild derived settled series (site/data/*.json)
        run: uv run python -m engine.derived build

      - name: Refresh live fallback snapshot (non-fatal — live layer is primary)
        run: |
          uv run python -m engine.build_site build \
            || echo "::warning::live fallback rebuild failed; keeping last-good latest.json"

      - name: Cache Playwright Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('uv.lock') }}

      - name: Install Chromium for share cards
        run: uv run playwright install --with-deps chromium

      # After the live-snapshot refresh above, so the live card is built from the
      # current latest.json (not the previous cycle's). Non-fatal — yesterday's
      # dated cards stay live on a render failure.
      - name: Rebuild share cards
        run: uv run python -m engine.sharecards build
          || echo "::warning::share cards failed — previous cards remain"

      - name: Commit & push if the data changed
        run: |
          git config user.name "grid-margin-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/history site/data site/share site/s site/index.html
          if git diff --cached --quiet; then
            echo "No data changes — nothing to publish."
          else
            git commit -m "data: daily settled refresh [skip ci]"
            git push
          fi

      - name: Trigger Vercel deploy (explicit hook; push auto-deploy is unreliable)
        if: success()
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" > /dev/null
          else
            echo "::warning::VERCEL_DEPLOY_HOOK not set — relying on git-integration auto-deploy"
          fi
