name: parity

# Cross-language regression guard. Either implementation (Python engine or JS port)
# diverging from the committed golden vectors fails the build. No browser, no network
# (all fixtures are committed and the build/fetch tests are network-free). Does NOT run
# `emit-vectors`, so a wrong engine change cannot regenerate the fixture and self-certify.
on:
  push:
  pull_request:

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Sync Python deps
        run: uv sync
      - name: Python + cross-engine parity (pytest)
        run: uv run pytest
      - name: JS suites (node)
        run: node --test site/verdict.test.mjs site/live.test.mjs
